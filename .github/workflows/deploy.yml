name: Build & Deploy

# Builds the site and pushes it to a `gh-pages` branch, which GitHub Pages serves.
# This avoids the flaky actions/deploy-pages API entirely.
#
# ONE-TIME SETUP (in your repo):
#   Settings → Pages → Build and deployment → Source → "Deploy from a branch"
#   Branch: gh-pages  /  folder: /(root)  →  Save

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Push the contents of dist/ to the gh-pages branch
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
