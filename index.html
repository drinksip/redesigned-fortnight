<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0910" />
    <meta
      name="description"
      content="NovaTrack — a premium GCSE revision tracker. Track your spec topic-by-topic, set grade targets, count down to exams, and get AI-powered revision coaching that works out of the box."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <title>GCSE Revision Tracker</title>
    <script>
      // Apply saved/system theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("gcse_theme");
          if (!t)
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          var root = document.documentElement;
          if (t === "dark") root.classList.add("dark");
          root.style.backgroundColor = t === "dark" ? "#0a0910" : "#f5f4fb";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
